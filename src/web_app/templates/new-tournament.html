<!DOCTYPE html>
<html lang="es">
{% include "template_head.html" %}
<body>

        {% include "template_header.html" %}

        <!-- CONTENIDO PRINCIPAL -->
        <main class="content">

            <div class="form-container">
            <h2>Crear Nuevo Evento</h2>

            <form action="/create-new-tournament" method="POST">

                <!-- Nombre -->
                <label for="nombre">Nombre del Evento</label>
                <input type="text" id="nombre" name="nombre" maxlength="30" required>

                <!-- Set -->
                <label for="set">Set</label>
                <input type="number" id="set" name="set" min="1" max="20" value="1" required>

                <!-- Imagen -->
                <label for="imagen">Imagen del Evento</label>
                <select id="imagen" name="imagen" required>
                    <option value="">Selecciona una imagen</option>
                    <option value="1">Trio</option>
                </select>

                <button type="submit">Crear Evento</button>
            </form>
        </div>



        </main>

</body>
{% include "footer.html" %}
</html>
