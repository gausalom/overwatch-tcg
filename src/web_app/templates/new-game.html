<!DOCTYPE html>
<html lang="es">
{% include "template_head.html" %}
<body>

        {% include "template_header.html" %}

        <!-- CONTENIDO PRINCIPAL -->
        <main class="content">

            <div class="form-container">
            <h2>Crear Nueva Partida</h2>

            <form action="/create-new-game" method="POST">

                <!-- Nombre -->
                <label for="nombre">Nombre de la Partida</label>
                <input type="text" id="nombre" name="nombre" maxlength="30" required>

                <label for="nombre">Seed</label>
                <input type="text" id="seed" name="seed" maxlength="30" required>

                <!-- Set -->
                <label for="set">Set</label>
                <input type="number" id="set" name="set" min="1" max="20" value="12" required>

                <!-- Rival -->
                <label for="opponent">Jugador Oponente</label>
                <select id="opponent" name="opponent" required>
                    <option value="">Selecciona un Rival</option>
                    {% for user in all_users %}
                        <option value="{{user.id_player}}">{{user.player_name}}</option>
                    {% endfor %}
                </select>

                <!-- Mi mazo -->
                <label for="my_deck">Tu Mazo</label>
                <select id="my_deck" name="my_deck" required>
                    <option value="">Selecciona tu Mazo</option>
                    {% for deck in all_decks %}
                        <option value="{{deck.id_deck}}">{{deck.player_name}} - {{deck.set_deck}} - {{deck.deck_name}}</option>
                    {% endfor %}
                </select>

                <!-- Mazo oponente -->
                <label for="your_deck">Mazo del Oponente</label>
                <select id="your_deck" name="your_deck" required>
                    <option value="">Selecciona Mazo del Rival</option>
                    {% for deck in all_decks %}
                        <option value="{{deck.id_deck}}">{{deck.player_name}} - {{deck.set_deck}} - {{deck.deck_name}}</option>
                    {% endfor %}
                </select>

                <button type="submit">Crear Partida</button>
            </form>
        </div>
        </main>
</body>
{% include "footer.html" %}
</html>
