<!DOCTYPE html>
<html lang="es">
{% include "template_head.html" %}
<body>

        {% include "template_header.html" %}

        <!-- CONTENIDO PRINCIPAL -->
        <main class="content">
            <div class="content">
                <a class="white" href="/control-panel">Volver</a>
            </div>

            <div class="form-container">
                <form action="/save-user/{{user.id_player}}" method="POST">

                    <!-- Nombre -->
                    <label for="nombre">Nombre del Usuario</label>
                    <input type="text" id="nombre" name="nombre" value="{{user.player_name}}" required disabled>

                    <!-- Team -->
                    <label for="team">Team</label>
                    <input id="team" name="team" value="{% if user.team is not none%}{{user.team}}{% endif %}" required>

                    <label for="password">Contraseña</label>
                    <input id="password" name="password" value="">

                    <label for="is_admin">Is Admin</label>
                    <input type="checkbox" id="is_admin" name="is_admin" {% if user.is_admin == 1 %}checked="checked"{% endif %}>

                    <label for="is_inactive">Is Inactive</label>
                    <input type="checkbox" id="is_inactive" name="is_inactive" {% if user.is_inactive == 1 %}checked="checked"{% endif %}>

                    <label for="num_booster_to_open">Num Booster to Open</label>
                    <input type="number" id="num_booster_to_open" name="num_booster_to_open" value="{{user.num_booster_to_open}}">

                    <button type="submit">Guardar</button>
                </form>
            </div>
        </main>

    <script src="{{ url_for('static', filename='js/control-panel.js') }}"></script>
</body>
{% include "footer.html" %}
</html>
