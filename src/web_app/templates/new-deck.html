<!DOCTYPE html>
<html lang="es">
{% include "template_head.html" %}
<body>

        {% include "template_header.html" %}

        <!-- CONTENIDO PRINCIPAL -->
        <main class="content">

            <div class="form-container">
            <h2>Crear Mazo</h2>

            <form action="/create-new-deck" method="POST">

                <!-- Nombre -->
                <label for="nombre">Nombre del mazo</label>
                <input type="text" id="nombre" name="nombre" maxlength="30" required>

                <!-- Set -->
                <label for="set">Set</label>
                <input type="number" id="set" name="set" min="1" max="20" value="1" required>

                <label for="faction">Facción</label>
                <select id="faction" name="faction" required>
                    <option value="">Selecciona una Tinta</option>
                    <option value="1">Vanguard</option>
                    <option value="2">Dominion</option>
                    <option value="3">Omnic</option>
                    <option value="4">Outlander</option>
                </select>

                <!-- Imagen -->
                <label for="imagen">Imagen del mazo</label>
                <select id="imagen" name="imagen" required>
                    <option value="">Selecciona una imagen</option>
                    <option value="1">Trio</option>
                    <option value="2" >Halloween</option>
                    <option value="3" >Battle</option>
                    <option value="4" >Dive</option>
                    <option value="5" >Poke</option>
                </select>

                <!-- Lista -->
                <label for="lista">Lista del mazo</label>
                <textarea id="lista" name="lista" rows="10" placeholder="Escribe aquí la lista..."></textarea>

                <button type="submit">Crear Mazo</button>
            </form>
        </div>



        </main>

</body>
{% include "footer.html" %}
</html>
